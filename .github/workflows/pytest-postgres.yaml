name: Pytest CI (Postgres)
on:
  push:
    branches:
      - version-15
      - version-16
  pull_request:

permissions:
  contents: write
  checks: write
  issues: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  BRANCH_NAME: ${{ github.base_ref || github.ref_name }}

jobs:
  tests:
    name: Server (Postgres)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18.0
        env:
          POSTGRES_PASSWORD: travis
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 3


    steps:
      - name: Clone
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          check-latest: true
          cache: 'yarn'

      - name: Add to Hosts
        run: echo "127.0.0.1 test_site" | sudo tee -a /etc/hosts

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/*requirements.txt', '**/pyproject.toml', '**/setup.py', '**/setup.cfg') }}
          restore-keys: |
            ${{ runner.os }}-pip-
            ${{ runner.os }}-

      - name: Install Poetry
        uses: snok/install-poetry@v1

      - name: Install JS Dependencies
        run: yarn --prefer-offline

      - name: Install App Dependencies
        run: bash ${{ github.workspace }}/.github/helper/install_dependencies.sh
        env:
          DB: postgres

      - name: Install Bench Site and Apps
        env:
          DB: postgres
          BRANCH_NAME: ${{ env.BRANCH_NAME}}
        run: |
          bash ${{ github.workspace }}/.github/helper/install.sh

      - name: Install Test Fixtures
        working-directory: /home/runner/frappe-bench
        env:
          CI: true
        run: |
          bench execute 'fleet.tests.setup.before_test'

      - name: Run Tests
        working-directory: /home/runner/frappe-bench
        run: |
          source env/bin/activate
          cd apps/fleet
          poetry install
          pytest --cov=fleet --cov-report=xml --disable-warnings -s | tee pytest-coverage.txt

